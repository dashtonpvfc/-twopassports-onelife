{{ define "main" }}
<section class="hero">
  <div class="hero-bg" style="background-image: url('/hero.jpg')"></div>
  <div class="hero-overlay"></div>
  <div class="container hero-content">
    <p class="hero-eyebrow">Welcome to</p>
    <h1 class="hero-title">Two Passports, One Life</h1>
    <p class="hero-subtitle">The world is big. We're working on it.</p>
    <a href="/destinations/" class="hero-btn">Explore our destinations</a>
  </div>
</section>
<section class="container" style="padding: 3rem 0;">
  <h2 class="section-heading">Our Destinations</h2>
  <div class="posts-grid">
    {{ range (site.GetPage "/destinations").Sections.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="post-card">
      <div class="post-card-img-link">
        <img src="{{ .RelPermalink }}cover.jpg" alt="{{ .Title }}" class="post-card-img">
      </div>
      <div class="post-card-body"><h2 class="post-card-title">{{ .Title }}</h2></div>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
